# Attacker LLM Agent Configuration

llm:
  model: "gpt-4o-mini"            # OpenAI backend model
  temperature: 0.7
  ollama_model: "gpt-oss:20b"  # Ollama backend model

# Decimal places for weight serialization (controls token usage)
weight_precision: 6

# Dynamic weight subset configuration
initial_weights: 100
min_weights: 100
max_weights: 400

memory:
  persist_path: "checkpoints/attacker_memory"
