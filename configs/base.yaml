# Federated Learning Configuration

fl:
  training_rounds: 3          # Phase 1: honest training rounds
  simulation_rounds: 2000       # Phase 2: attack/defend rounds
  n_clients: 5
  malicious_client_id: 0      # 0-indexed client that becomes adversarial
  local_epochs: 5              # Increased to strengthen client deltas
  batch_size: 64
  lr: 0.002
  device: "cpu"

data:
  dataset: "mnist"
  iid: false
  data_dir: "./data/mnist_raw"

# Default Ollama settings (used when --env linux)
llm:
  ollama_base_url: "http://localhost:11434"
  ollama_model: "gpt-oss:20b"
